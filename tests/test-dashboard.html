<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>탈출로드맵 테스트 대시보드</title>
<style>
  :root {
    --bg: #0f1117;
    --bg-card: #1a1d27;
    --bg-card-hover: #222633;
    --border: #2a2e3d;
    --text: #e4e6ed;
    --text-dim: #8b8fa3;
    --accent: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --orange: #f97316;
    --purple: #a855f7;
    --cyan: #06b6d4;
    --teal: #00b1bb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 24px;
    min-height: 100vh;
  }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }
  .subtitle code { background: #222633; padding: 2px 8px; border-radius: 4px; font-size: 13px; color: var(--green); }
  .subtitle .fail-code { color: var(--red); }

  /* Stats */
  .stats-bar { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 24px; min-width: 140px; flex: 1; }
  .stat-card .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-card .value { font-size: 28px; font-weight: 700; }
  .stat-card .value.total { color: var(--accent); }
  .stat-card .value.pass { color: var(--green); }
  .stat-card .value.fail { color: var(--red); }
  .stat-card .value.pending { color: var(--text-dim); }

  /* Progress */
  .progress-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 24px; margin-bottom: 32px; }
  .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; color: var(--text-dim); }
  .progress-bar { height: 8px; background: #2a2e3d; border-radius: 4px; overflow: hidden; display: flex; }
  .progress-bar .pass-bar { background: var(--green); transition: width 0.3s; }
  .progress-bar .fail-bar { background: var(--red); transition: width 0.3s; }

  /* Filters */
  .filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Cards */
  .tc-grid { display: grid; gap: 16px; }
  .tc-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: all 0.2s; }
  .tc-card:hover { border-color: #3b4460; }
  .tc-card.hidden { display: none; }
  .tc-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; cursor: pointer; user-select: none; }
  .tc-header:hover { background: var(--bg-card-hover); }
  .tc-num { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; background: #2a2e3d; color: var(--text-dim); white-space: nowrap; }
  .tc-title { font-weight: 600; font-size: 15px; flex: 1; }
  .tc-point { font-size: 12px; color: var(--text-dim); flex: 1.5; }
  .tc-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .tag.l1 { background: #1e3a5f; color: #60a5fa; }
  .tag.l2 { background: #1a3d2e; color: #4ade80; }
  .tag.l3 { background: #3b1f54; color: #c084fc; }
  .tag.extra { background: #3b2f1a; color: #fbbf24; }
  .tag.debt { background: #3b1a1a; color: #f87171; }
  .tag.event { background: #1a3b3b; color: #5eead4; }
  .tc-expect { font-size: 13px; font-weight: 600; white-space: nowrap; }
  .tc-expect.expect-pass { color: var(--green); }
  .tc-expect.expect-fail { color: var(--red); }
  .tc-expect.expect-maybe { color: var(--yellow); }
  .tc-result-badge { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 6px; cursor: pointer; border: none; transition: all 0.15s; }
  .tc-result-badge.none { background: #2a2e3d; color: var(--text-dim); }
  .tc-result-badge.pass { background: #14532d; color: #4ade80; }
  .tc-result-badge.fail { background: #450a0a; color: #fca5a5; }
  .expand-icon { color: var(--text-dim); transition: transform 0.2s; font-size: 18px; }
  .tc-card.open .expand-icon { transform: rotate(180deg); }

  /* Detail */
  .tc-detail { display: none; border-top: 1px solid var(--border); }
  .tc-card.open .tc-detail { display: block; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .detail-left { padding: 20px; border-right: 1px solid var(--border); }
  .detail-right { padding: 20px; }
  @media (max-width: 900px) {
    .detail-grid { grid-template-columns: 1fr; }
    .detail-left { border-right: none; border-bottom: 1px solid var(--border); }
    .tc-point { display: none; }
  }
  .detail-section h3 { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .detail-table { width: 100%; font-size: 13px; }
  .detail-table td { padding: 5px 0; vertical-align: top; }
  .detail-table td:first-child { color: var(--text-dim); width: 130px; white-space: nowrap; }
  .detail-table td:last-child { font-weight: 500; }
  .detail-table .highlight { color: var(--cyan); font-weight: 600; }
  .detail-table .none-val { color: #555; font-style: italic; }

  /* Checklist */
  .checklist { list-style: none; }
  .checklist li { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; font-size: 13px; }
  .checklist input[type="checkbox"] { accent-color: var(--green); margin-top: 3px; width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; }
  .checklist li.checked { color: var(--text-dim); text-decoration: line-through; }

  /* Failure Card */
  .fail-card {
    margin-top: 16px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #3b1a1a;
  }
  .fail-card-header {
    background: linear-gradient(135deg, #dc2626 0%, #F04452 50%, #f87171 100%);
    padding: 16px;
    color: #fff;
  }
  .fail-card-header .fail-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .fail-card-header .fail-desc { font-size: 12px; opacity: 0.9; line-height: 1.6; }
  .fail-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--bg-card);
  }
  .fail-metric {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  .fail-metric:first-child { border-right: 1px solid var(--border); }
  .fail-metric .metric-label { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
  .fail-metric .metric-value { font-size: 15px; font-weight: 700; }
  .fail-metric .metric-value.red { color: var(--red); }
  .fail-reasons {
    padding: 12px 16px;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
  }
  .fail-reasons .reason-title { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; }
  .fail-reasons .reason-item {
    font-size: 12px;
    color: #fca5a5;
    padding: 3px 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .fail-reasons .reason-item::before { content: '!'; display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: #450a0a; color: #f87171; font-size: 10px; font-weight: 700; flex-shrink: 0; }

  /* Success Card */
  .success-card {
    margin-top: 16px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #14532d;
  }
  .success-card-header {
    background: var(--teal);
    padding: 16px;
    color: #fff;
  }
  .success-card-header .success-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .success-card-header .success-desc { font-size: 12px; opacity: 0.9; line-height: 1.6; }
  .success-summary {
    padding: 12px 16px;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
  }
  .success-summary .summary-item {
    font-size: 12px;
    color: #86efac;
    padding: 3px 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .success-summary .summary-item::before { content: '✓'; color: var(--green); font-weight: 700; flex-shrink: 0; }

  /* Strategy Card */
  .strategy-section {
    margin-top: 16px;
    border-radius: 10px;
    border: 1px solid #1a3b3b;
    overflow: hidden;
  }
  .strategy-header {
    background: linear-gradient(135deg, #0d4f52, #00b1bb);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
  }
  .strategy-header svg { flex-shrink: 0; }
  .strategy-list { background: var(--bg-card); }
  .strategy-item {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  .strategy-item:first-child { border-top: none; }
  .strategy-item .s-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #0d4f52;
    color: var(--teal);
    font-size: 11px;
    font-weight: 700;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .strategy-item .s-title { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; margin-bottom: 4px; }
  .strategy-item .s-impact { font-size: 12px; color: var(--teal); margin-bottom: 4px; }
  .strategy-item .s-advice { font-size: 11px; color: var(--text-dim); line-height: 1.6; }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--green); color: #000;
    padding: 12px 20px; border-radius: 8px;
    font-size: 14px; font-weight: 600;
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s; z-index: 100;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>

// State
let testResults = {};

function init() {
  loadData();
  renderCards();
  updateStats();
  setupFilters();
}

function renderCards() {
  const grid = document.getElementById('tcGrid');
  grid.innerHTML = '';
  TC_DATA.forEach(tc => {
    const result = testResults[tc.id] || {};
    const status = result.status || 'none';
    const card = document.createElement('div');
    card.className = 'tc-card';
    card.dataset.id = tc.id;
    card.dataset.tags = tc.tags.join(',');
    card.dataset.status = status;

    const expectClass = tc.expectResult === 'pass' ? 'expect-pass' : tc.expectResult === 'fail' ? 'expect-fail' : 'expect-maybe';
    const expectIcon = tc.expectResult === 'pass' ? '✅' : tc.expectResult === 'fail' ? '❌' : '⚠️';
    const badgeClass = status;
    const badgeText = status === 'pass' ? '✅ 성공' : status === 'fail' ? '❌ 실패' : '미확인';

    const tagLabels = { l1:'1층 국민연금', l2:'2층 퇴직연금', l3:'3층 개인연금', extra:'추가자산', debt:'부채', event:'비정기지출', 'no-pension':'연금없음' };
    const tagsHtml = tc.tags.map(t => `<span class="tag ${t}">${tagLabels[t]||t}</span>`).join('');

    let fieldsHtml = '';
    for (const [k, v] of Object.entries(tc.fields)) {
      const val = v === null ? '<span class="none-val">없음</span>' : (v.includes('0원') || v === '0%' ? `<span class="highlight">${v}</span>` : v);
      fieldsHtml += `<tr><td>${k}</td><td>${val}</td></tr>`;
    }

    const checksHtml = tc.checks.map((c, i) => {
      const checked = result.checks?.[i] || false;
      return `<li class="${checked?'checked':''}"><input type="checkbox" ${checked?'checked':''} onchange="toggleCheck('${tc.id}',${i},this)"><span>${c}</span></li>`;
    }).join('');

    // Fail or Success card
    let resultCardHtml = '';
    if (tc.failCard) {
      const fc = tc.failCard;
      resultCardHtml = `
        <div class="fail-card">
          <div class="fail-card-header">
            <div class="fail-title">${fc.title}</div>
            <div class="fail-desc">${fc.desc}</div>
          </div>
          <div class="fail-metrics">
            <div class="fail-metric"><div class="metric-label">부족 금액 (연)</div><div class="metric-value red">${fc.deficit}</div></div>
            <div class="fail-metric"><div class="metric-label">가장 어려운 시점</div><div class="metric-value">${fc.hardestAge}</div></div>
          </div>
          <div class="fail-reasons">
            <div class="reason-title">실패 원인 분석</div>
            ${fc.reasons.map(r => `<div class="reason-item">${r}</div>`).join('')}
          </div>
        </div>`;
    }
    if (tc.successCard) {
      const sc = tc.successCard;
      resultCardHtml = `
        <div class="success-card">
          <div class="success-card-header">
            <div class="success-title">${sc.title}</div>
            <div class="success-desc">${sc.desc}</div>
          </div>
          <div class="success-summary">
            ${sc.points.map(p => `<div class="summary-item">${p}</div>`).join('')}
          </div>
        </div>`;
    }

    // Strategy section
    let strategyHtml = '';
    if (tc.strategy && tc.strategy.length > 0) {
      strategyHtml = `
        <div class="strategy-section">
          <div class="strategy-header">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff" stroke="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            즉시 탈출 전략 안내
          </div>
          <div class="strategy-list">
            ${tc.strategy.map((s, i) => `
              <div class="strategy-item">
                <div class="s-title"><span class="s-num">${i+1}</span>${s.title}</div>
                <div class="s-impact">${s.impact}</div>
                <div class="s-advice">${s.advice}</div>
              </div>
            `).join('')}
          </div>
        </div>`;
    }

    card.innerHTML = `
      <div class="tc-header" onclick="toggleCard(this)">
        <span class="tc-num">TC-${tc.id}</span>
        <span class="tc-title">${tc.title}</span>
        <span class="tc-point">${tc.point}</span>
        <span class="tc-expect ${expectClass}">${expectIcon} 예상: ${tc.expectText}</span>
        <button class="tc-result-badge ${badgeClass}" onclick="event.stopPropagation();cycleResult('${tc.id}',this)">${badgeText}</button>
        <span class="expand-icon">&#9662;</span>
      </div>
      <div class="tc-detail">
        <div class="detail-grid">
          <div class="detail-left">
            <div class="detail-section">
              <h3>입력값</h3>
              <table class="detail-table">${fieldsHtml}</table>
            </div>
            ${resultCardHtml}
          </div>
          <div class="detail-right">
            <div class="detail-section">
              <h3>레이어 구성</h3>
              <div style="margin-bottom:16px">${tagsHtml}</div>
              <h3>확인 체크리스트</h3>
              <ul class="checklist">${checksHtml}</ul>
            </div>
            ${strategyHtml}
          </div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function toggleCard(header) { header.closest('.tc-card').classList.toggle('open'); }

function cycleResult(id, btn) {
  const states = ['none','pass','fail'];
  const labels = { none:'미확인', pass:'✅ 성공', fail:'❌ 실패' };
  if (!testResults[id]) testResults[id] = {};
  const cur = testResults[id].status || 'none';
  const next = states[(states.indexOf(cur)+1) % states.length];
  testResults[id].status = next;
  btn.className = `tc-result-badge ${next}`;
  btn.textContent = labels[next];
  btn.closest('.tc-card').dataset.status = next;
  updateStats();
  saveData();
}

function toggleCheck(id, idx, cb) {
  if (!testResults[id]) testResults[id] = {};
  if (!testResults[id].checks) testResults[id].checks = {};
  testResults[id].checks[idx] = cb.checked;
  cb.closest('li').classList.toggle('checked', cb.checked);
  saveData();
}

function updateStats() {
  let pass=0, fail=0;
  TC_DATA.forEach(tc => { const s=testResults[tc.id]?.status; if(s==='pass')pass++; if(s==='fail')fail++; });
  const total=TC_DATA.length, pending=total-pass-fail, done=pass+fail;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPass').textContent = pass;
  document.getElementById('statFail').textContent = fail;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('progressPct').textContent = Math.round(done/total*100)+'%';
  document.getElementById('passBar').style.width = (pass/total*100)+'%';
  document.getElementById('failBar').style.width = (fail/total*100)+'%';
}

function setupFilters() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const f = btn.dataset.filter;
      document.querySelectorAll('.tc-card').forEach(card => {
        if (f==='all') { card.classList.remove('hidden'); return; }
        if (['pending','pass','fail'].includes(f)) { card.classList.toggle('hidden', f==='pending' ? (card.dataset.status||'none')!=='none' : card.dataset.status!==f); return; }
        if (f==='no-pension') { card.classList.toggle('hidden', !card.dataset.tags.includes('no-pension')); return; }
        card.classList.toggle('hidden', !card.dataset.tags.includes(f));
      });
    });
  });
}

const STORAGE_KEY = 'tc-dashboard-v2';
function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ testResults, savedAt: new Date().toISOString() })); }
function loadData() { try { const d = JSON.parse(localStorage.getItem(STORAGE_KEY)); if (d) testResults = d.testResults || {}; } catch(e){} }

function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1500); }

init();
</script>
