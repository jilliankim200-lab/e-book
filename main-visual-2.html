<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 652px; height: 488px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }

  .container {
    width: 652px; height: 488px;
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* 배경 원형 장식 */
  .circle-bg {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .c1 { width: 500px; height: 500px; top: -100px; left: -100px; }
  .c2 { width: 350px; height: 350px; bottom: -80px; right: -80px; }
  .c3 { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%,-50%); border-color: rgba(232,197,71,0.08); }

  /* 3단계 스텝 */
  .steps {
    display: flex; gap: 16px; margin-bottom: 36px;
    position: relative; z-index: 2;
  }

  .step {
    text-align: center; width: 160px;
  }

  .step-num {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; margin: 0 auto 10px;
    position: relative;
  }

  .step:nth-child(1) .step-num {
    background: rgba(56, 189, 248, 0.15);
    border: 2px solid rgba(56, 189, 248, 0.4);
    color: #38bdf8;
  }
  .step:nth-child(2) .step-num {
    background: rgba(251, 191, 36, 0.15);
    border: 2px solid rgba(251, 191, 36, 0.4);
    color: #fbbf24;
  }
  .step:nth-child(3) .step-num {
    background: rgba(16, 185, 129, 0.15);
    border: 2px solid rgba(16, 185, 129, 0.4);
    color: #10b981;
  }

  .step-title {
    font-size: 18px; font-weight: 900; margin-bottom: 4px;
  }
  .step:nth-child(1) .step-title { color: #38bdf8; }
  .step:nth-child(2) .step-title { color: #fbbf24; }
  .step:nth-child(3) .step-title { color: #10b981; }

  .step-desc {
    font-size: 12px; color: #94a3b8; line-height: 1.5;
  }

  /* 스텝 사이 화살표 */
  .arrow {
    display: flex; align-items: center; padding-top: 0px;
    color: rgba(255,255,255,0.15); font-size: 20px;
    margin-top: -20px;
  }

  /* 메인 타이틀 */
  .main-title {
    font-size: 54px; font-weight: 900; text-align: center;
    color: #ffffff; line-height: 1.2; margin-bottom: 10px;
    position: relative; z-index: 2; letter-spacing: -2px;
  }
  .main-title .highlight {
    background: linear-gradient(135deg, #38bdf8, #10b981);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .sub-label {
    font-size: 14px; color: #64748b; letter-spacing: 4px;
    text-align: center; margin-bottom: 30px;
    position: relative; z-index: 2;
  }

  /* 하단 키워드 */
  .bottom-bar {
    display: flex; gap: 24px; align-items: center;
    position: relative; z-index: 2;
    margin-top: 10px;
  }
  .bottom-bar .item {
    color: #475569; font-size: 13px; font-weight: 400;
  }
  .bottom-bar .dot {
    width: 3px; height: 3px; border-radius: 50%;
    background: #334155;
  }

  /* 상단 뱃지 */
  .top-badge {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #e2e8f0;
    font-size: 13px; font-weight: 700;
    padding: 6px 20px; border-radius: 20px;
    margin-bottom: 28px;
    position: relative; z-index: 2;
    letter-spacing: 1px;
  }

  /* 하단 슬로건 */
  .slogan {
    color: #94a3b8; font-size: 15px;
    position: relative; z-index: 2;
    text-align: center; margin-top: 24px;
  }
  .slogan em {
    font-style: normal; color: #e2e8f0; font-weight: 700;
  }
</style>
</head>
<body>
<div class="container">
  <div class="circle-bg c1"></div>
  <div class="circle-bg c2"></div>
  <div class="circle-bg c3"></div>

  <div class="top-badge">은퇴 시뮬레이션 프로그램</div>

  <div class="main-title">
    <span class="highlight">탈출지도</span>
  </div>
  <div class="sub-label">ESCAPE ROUTE PLANNER</div>

  <!-- 3단계 -->
  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-title">숫자를 넣고</div>
      <div class="step-desc">나의 연금, 자산, 생활비<br>현실 그대로 입력</div>
    </div>
    <div class="arrow">&#10132;</div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-title">현실을 보고</div>
      <div class="step-desc">자산 수명, 적자 시점<br>연도별 현금흐름 확인</div>
    </div>
    <div class="arrow">&#10132;</div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-title">계획을 세워라</div>
      <div class="step-desc">4가지 전략 제시<br>즉시 시뮬레이션 반영</div>
    </div>
  </div>

  <div class="slogan">막연한 불안 대신, <em>숫자로 확신</em>을 드립니다</div>
</div>
</body>
</html>
